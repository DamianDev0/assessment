name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Build
        run: pnpm run build
        env:
          API_URL: http://localhost:5000
          NEXT_PUBLIC_API_URL: http://localhost:5000
          DEFAULT_ORG_ID: "00000000-0000-0000-0000-000000000001"
          NEXT_PUBLIC_ORG_ID: "00000000-0000-0000-0000-000000000001"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/.next
            frontend/public
            frontend/package.json
            frontend/pnpm-lock.yaml
            frontend/next.config.ts
          retention-days: 1


  backend:
    name: Backend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jobtracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Domain tests
        run: dotnet test tests/JobTracker.Jobs.Domain.Tests --no-build --configuration Release --verbosity normal

      - name: Application tests
        run: dotnet test tests/JobTracker.Jobs.Application.Tests --no-build --configuration Release --verbosity normal

      - name: Architecture tests
        run: dotnet test tests/JobTracker.Jobs.Architecture.Tests --no-build --configuration Release --verbosity normal

  # ─── Lighthouse ────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse (performance/a11y/best-practices/seo ≥ 90)
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Start stack (postgres + backend + frontend)
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Install Lighthouse CI
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm add -D @lhci/cli

      - name: Run Lighthouse CI
        working-directory: frontend
        run: pnpm exec lhci autorun --config=.lighthouserc.ci.json
        continue-on-error: true

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: frontend/.lighthouseci
          retention-days: 7

  # ─── E2E ──────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Start stack
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Run E2E tests
        working-directory: frontend
        run: pnpm exec playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
